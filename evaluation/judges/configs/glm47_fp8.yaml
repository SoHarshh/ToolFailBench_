# Judge 2 — GLM-4.7-FP8 (evidence-attribution framing).
# Drives scripts/run_judge.py: which model name to call, which endpoint env
# var to read, sampling, and which prompt overlay to use.
#
# Serving config (image, GPU spec, vllm flags) is hardcoded in
# modal_apps/judge_2_glm47.py — that's the single source of truth.

judge_name: glm47_fp8

model:
  hf_id: zai-org/GLM-4.7-FP8
  served_name: glm-4.7-fp8

endpoint:
  api_base_env: JUDGE_GLM47_API_BASE
  api_key_env: JUDGE_GLM47_API_KEY

inference:
  temperature: 0.0
  max_tokens: 512
  num_retries: 10
  timeout: 120
  # GLM-4.7 thinking is enabled by default in vLLM; disable per-request.
  extra_body:
    chat_template_kwargs:
      enable_thinking: false

prompt:
  base_rubric: base_rubric.md
  variant: variant_b_evidence.md
